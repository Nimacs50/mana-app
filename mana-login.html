        /* Glassmorphism card premium styling */
        .glass-card {
            background: rgba(13, 22, 17, 0.55);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .light .glass-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        /* Input styling with glowing borders on focus */
        .glass-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .light .glass-input {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.12);
            color: #1a2e1a;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #84cc16;
            box-shadow: 0 0 15px rgba(132, 204, 22, 0.25);
        }

        .light .glass-input:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #65a30d;
            box-shadow: 0 0 15px rgba(101, 163, 13, 0.2);
        }

        /* Elegant transitions between Login and Register sections */
        .form-section {
            transition: all 0.4s ease-in-out;
        }
        
        .form-hidden {
            display: none;
            opacity: 0;
            transform: translateY(15px);
        }
        
        .form-visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(132, 204, 22, 0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(132, 204, 22, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 ambient-bg transition-all duration-500">

    <!-- Toast / Notification element for professional alerts -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-300 opacity-0 pointer-events-none translate-y-[-20px]">
        <div class="flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl glass-card border border-mana border-opacity-40 text-white min-w-[300px]">
            <span id="toast-icon" class="text-2xl text-mana">🌱</span>
            <div class="flex flex-col">
                <p id="toast-title" class="font-bold text-sm text-slate-100 dark:text-white"></p>
                <p id="toast-message" class="text-xs text-slate-400 dark:text-slate-300 mt-0.5"></p>
            </div>
        </div>
    </div>

    <!-- Main Container: Limits maximum width on large screens -->
    <div class="w-full max-w-[440px] relative py-2 z-10">

    <!-- Interactive Client-side Scripting -->
    <script>
        // Form Switching Logic: smooth transitions between Login and Register states within the same card.
        function switchForm(target) {
            const loginSec = document.getElementById('login-section');
            const registerSec = document.getElementById('register-section');
            const authCard = document.getElementById('auth-card');

            // Apply slight scaling effect for high-end feeling transition
            authCard.style.transform = "scale(0.98)";
            authCard.style.opacity = "0.9";

            setTimeout(() => {
                if (target === 'register') {
                    loginSec.classList.remove('form-visible');
                    loginSec.classList.add('form-hidden');
                    
                    registerSec.classList.remove('form-hidden');
                    registerSec.classList.add('form-visible');
                } else {
                    registerSec.classList.remove('form-visible');
                    registerSec.classList.add('form-hidden');
                    
                    loginSec.classList.remove('form-hidden');
                    loginSec.classList.add('form-visible');
                }
                authCard.style.transform = "scale(1)";
                authCard.style.opacity = "1";
            }, 250);
        }

        // Toggle Password Input Visibility (Eye icon click)
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const buttonIcon = document.getElementById(iconId);

            if (input.type === 'password') {
                input.type = 'text';
                // Render Eye Off icon
                buttonIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                `;
            } else {
                input.type = 'password';
                // Render Normal Eye icon
                buttonIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                `;
            }
        }

        // Handle Login Submission
        function handleLogin(event) {
            event.preventDefault();
            const identifier = document.getElementById('login-identifier').value;
            showToast('ورود موفقیت‌آمیز', `${identifier} عزیز، خوش آمدید!`, '🔓');
            // پس از ورود موفق، کاربر به صفحه اصلی سایت (وردپرس) هدایت می‌شود
            setTimeout(() => {
                window.location.href = 'index.php';
            }, 1500);
        }

        // Handle Registration Submission
        function handleRegister(event) {
            event.preventDefault();
            const firstName = document.getElementById('reg-firstname').value;
            const lastName = document.getElementById('reg-lastname').value;
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;

            if (password !== confirmPassword) {
                showToast('خطا در ثبت‌نام', 'کلمه عبور و تکرار آن با هم مطابقت ندارند.', '❌');
                return;
            }

            showToast('ثبت نام موفق', `${firstName} ${lastName} عزیز، حساب شما در مانا فعال شد.`, '🌱');
            setTimeout(() => {
                switchForm('login');
            }, 2000);
        }

        // Handle Social OAuth Integration Alerts
        function handleOAuth(provider) {
            showToast('اتصال با حساب خارجی', `در حال اتصال ایمن به درگاه ${provider}...`, '🌐');
            // پس از اتصال موفق، کاربر به صفحه اصلی سایت (وردپرس) هدایت می‌شود
            setTimeout(() => {
                window.location.href = 'index.php';
            }, 1500);
        }

        // Language Dropdown Toggle
        function toggleLangDropdown() {
            const dropdown = document.getElementById('lang-dropdown');
            dropdown.classList.toggle('opacity-0');
            dropdown.classList.toggle('pointer-events-none');
            dropdown.classList.toggle('translate-y-[-10px]');
        }

        // Theme Toggle: Switching between Dark mode and Light mode
        function toggleTheme() {
            const html = document.documentElement;
            const darkIcon = document.getElementById('theme-dark-icon');
            const lightIcon = document.getElementById('theme-light-icon');

            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                darkIcon.classList.add('hidden');
                lightIcon.classList.remove('hidden');
                localStorage.setItem('theme', 'light');
                showToast('پوسته روشن فعال شد', 'محیط بصری به حالت روشن تغییر یافت.', '☀️');
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                lightIcon.classList.add('hidden');
                darkIcon.classList.remove('hidden');
                localStorage.setItem('theme', 'dark');
                showToast('پوسته تاریک فعال شد', 'بهینه‌سازی شده برای محیط‌های کم‌نور.', '🌙');
            }
        }

        // Custom Premium Toast / Alert system
        function showToast(title, message, icon = '🌱') {
            const toast = document.getElementById('toast');
            const toastTitle = document.getElementById('toast-title');
            const toastMessage = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');

            toastTitle.innerText = title;
            toastMessage.innerText = message;
            toastIcon.innerText = icon;

            // Animate In
            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');

            // Automatically Animate Out after 4 seconds
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-[-20px]');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 4000);
        }

        // Initialize preferred theme (Dark mode by default)
        window.onload = function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.remove('dark');
                document.documentElement.classList.add('light');
                document.getElementById('theme-dark-icon').classList.add('hidden');
                document.getElementById('theme-light-icon').classList.remove('hidden');
            }
        }

        // Close dropdown if user clicks outside
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('lang-dropdown');
            const button = dropdown.previousElementSibling;
            if (!button.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('opacity-0', 'pointer-events-none', 'translate-y-[-10px]');
            }
        });
    </script>
</body>
</html>
